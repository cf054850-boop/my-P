<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הציפור הנועזת - התחברות</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="game-screen.css">
</head>
<body>

    <button id="theme-toggle" class="theme-btn">🌓 שנה מצב תצוגה</button>

    <div id="screen-auth" class="screen active">
        <div class="card">
            <h1 class="game-title">הציפור הנועזת</h1>
            <p class="game-subtitle">הירשמו כדי לשמור שיאים ולהתחיל לעוף!</p>
            
            <form id="auth-form">
                <div class="input-group">
                    <label for="username">שם משתמש:</label>
                    <input type="text" id="username" placeholder="הקש שם משתמש" required>
                </div>
                <div class="input-group">
                    <label for="email">אימייל:</label>
                    <input type="text" id="email" placeholder="example@mail.com" required>
                    <span class="error-msg" id="email-error" style="color: #ff4d4d; font-size: 12px; display: none; margin-top: 4px; text-align: right;">כתובת אימייל לא תקינה</span>
                </div>
                <div class="input-group">
                    <label for="password">סיסמה (מינימום 6 תווים):</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <span class="error-msg" id="password-error" style="color: #ff4d4d; font-size: 12px; display: none; margin-top: 4px; text-align: right;">הסיסמה חייבת להכיל לפחות 6 תווים, הכוללים גם אותיות וגם מספרים</span>
                </div>

                <div class="input-group" style="text-align: center; margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 10px; text-align: right;">בחר רמת קושי:</label>
                    <div class="difficulty-controls" style="justify-content: center;">
                        <button type="button" class="diff-btn" id="btn-easy">קל</button>
                        <button type="button" class="diff-btn active" id="btn-medium">בינוני</button>
                        <button type="button" class="diff-btn" id="btn-hard">קשה</button>
                    </div>
                </div>

                <button type="submit" class="btn-main">התחבר והתחל לשחק</button>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
