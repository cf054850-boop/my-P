<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הציפור הנועזת - המשחק נגמר</title>
   
    <link rel="stylesheet" href="global.css">
 
    <link rel="stylesheet" href="gameover-screen.css">
</head>
<body>

    <div id="screen-gameover" class="screen active">
        <div class="card">
            <h1 class="gameover-title">המשחק נגמר! 💥</h1>
            <p class="final-score-text">הניקוד שלך: <span id="final-score">0</span></p>
            
            <h3>טבלת מובילים</h3>
            <div class="search-box">
                <input type="text" id="search-player" placeholder="🔍 חפש שחקן בטבלה...">
            </div>
            <div class="table-container">
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>מיקום</th>
                            <th>שם שחקן</th>
                            <th>ניקוד</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                    </tbody>
                </table>
            </div>
            
            <button id="btn-restart" class="btn-main">משחק חדש 🔄</button>
        </div>
    </div>

  
    <script src="game.js"></script>
</body>
</html>
